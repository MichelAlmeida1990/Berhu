<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berhu - Acesso Espiritual</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Tailwind Configuration for Custom Colors/Fonts -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Outfit"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            purple: '#8B5CF6',
                            dark: '#0F172A',
                            accent: '#D946EF'
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Glass Styles */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        
        .glass-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }
        
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
            outline: none;
        }

        /* Ambient Background */
        .ambient-light {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            z-index: 0;
            opacity: 0.6;
        }

        /* Checkbox Custom */
        .custom-checkbox:checked {
            background-color: #8B5CF6;
            border-color: #8B5CF6;
        }
    </style>
</head>
<body class="min-h-screen bg-[#0a0a0f] text-white flex items-center justify-center relative overflow-x-hidden font-sans selection:bg-purple-500 selection:text-white py-10">

    <!-- Ambient Background Effects -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="ambient-light bg-purple-600 w-[500px] h-[500px] top-[-10%] left-[-10%] animate-pulse-slow"></div>
        <div class="ambient-light bg-blue-600 w-[400px] h-[400px] bottom-[-10%] right-[-10%] animate-pulse-slow" style="animation-delay: 2s;"></div>
        <div class="ambient-light bg-pink-600 w-[300px] h-[300px] top-[40%] left-[60%] opacity-40 animate-float"></div>
    </div>
    
    <!-- Esoteric Particles Container (Maintained from original) -->
    <div id="esotericIcons" class="fixed inset-0 overflow-hidden pointer-events-none z-0"></div>

    <!-- Main Content -->
    <div class="container relative z-10 px-4 mx-auto max-w-md">
        
        <!-- Header / Logo -->
        <div class="text-center mb-6 animate-float">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl glass-panel mb-3 shadow-[0_0_30px_rgba(139,92,246,0.3)]">
                <span class="font-display text-3xl font-bold bg-gradient-to-br from-white to-purple-200 bg-clip-text text-transparent">B</span>
            </div>
            <h1 class="font-display text-3xl font-bold tracking-tight mb-1">
                <span class="bg-gradient-to-r from-purple-400 via-pink-400 to-purple-400 bg-clip-text text-transparent bg-[length:200%_auto] animate-[gradient_3s_linear_infinite]">Berhu</span>
            </h1>
            <p class="text-gray-400 text-xs font-light tracking-wide uppercase">Plataforma de Evolução Espiritual</p>
        </div>

        <!-- Glass Card -->
        <div class="glass-panel rounded-3xl p-6 relative overflow-hidden">
            <!-- Decorative Top Gradient Line -->
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-purple-500 to-transparent opacity-50"></div>

            <!-- Tabs -->
            <div class="flex p-1 mb-6 rounded-xl bg-black/20 backdrop-blur-sm border border-white/5">
                <button id="login-tab" class="flex-1 py-2.5 text-xs font-medium rounded-lg transition-all duration-300 bg-white/10 text-white shadow-lg">
                    Entrar
                </button>
                <button id="register-tab" class="flex-1 py-2.5 text-xs font-medium rounded-lg transition-all duration-300 text-gray-400 hover:text-white hover:bg-white/5">
                    Criar Conta
                </button>
            </div>

            <!-- Forms Container -->
            <div class="relative min-h-[350px]">
                
                <!-- LOGIN FORM -->
                <form id="login-form" class="space-y-4 transition-all duration-500 absolute inset-0">
                    <div class="space-y-1">
                        <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider ml-1">Email</label>
                        <div class="relative group">
                            <i class="fa-regular fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-purple-400 transition-colors text-xs"></i>
                            <input type="email" id="login-email" required placeholder="seu@email.com"
                                class="glass-input w-full pl-9 pr-3 py-2.5 rounded-xl text-sm placeholder-gray-500 focus:placeholder-gray-400">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider ml-1">Senha</label>
                        <div class="relative group">
                            <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-purple-400 transition-colors text-xs"></i>
                            <input type="password" id="login-password" required placeholder="••••••••"
                                class="glass-input w-full pl-9 pr-3 py-2.5 rounded-xl text-sm placeholder-gray-500 focus:placeholder-gray-400">
                        </div>
                    </div>

                    <div class="flex items-center justify-between text-xs pt-1">
                        <label class="flex items-center text-gray-300 cursor-pointer group">
                            <input type="checkbox" id="remember" class="w-3.5 h-3.5 rounded border-gray-600 bg-white/5 checked:bg-purple-500 transition-colors mr-2 cursor-pointer outline-none focus:ring-1 focus:ring-purple-500/50">
                            <span class="group-hover:text-white transition-colors">Lembrar</span>
                        </label>
                        <a href="#" class="text-purple-400 hover:text-purple-300 transition-colors">Esqueceu?</a>
                    </div>

                    <button type="submit" 
                        class="w-full py-3 rounded-xl font-bold text-white bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 shadow-[0_0_15px_rgba(168,85,247,0.4)] hover:shadow-[0_0_25px_rgba(168,85,247,0.6)] transform hover:-translate-y-0.5 transition-all duration-300 active:scale-[0.98] text-sm">
                        Acessar Portal
                        <i class="fa-solid fa-arrow-right ml-2 text-xs opacity-70"></i>
                    </button>

                    <div class="relative py-3">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
                        <div class="relative flex justify-center"><span class="bg-[#1a1726] px-3 text-[10px] text-gray-500 rounded-full border border-white/5">ou</span></div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button type="button" id="google-login" class="glass-input py-2.5 rounded-xl flex items-center justify-center hover:bg-white/10 transform hover:-translate-y-0.5 transition-all">
                            <i class="fab fa-google text-red-500 mr-2 text-sm"></i>
                            <span class="text-xs font-medium text-gray-300">Google</span>
                        </button>
                        <button type="button" id="facebook-login" class="glass-input py-2.5 rounded-xl flex items-center justify-center hover:bg-white/10 transform hover:-translate-y-0.5 transition-all">
                            <i class="fab fa-facebook text-blue-500 mr-2 text-sm"></i>
                            <span class="text-xs font-medium text-gray-300">Facebook</span>
                        </button>
                    </div>

                    <div class="text-center pt-1">
                        <p class="text-[10px] text-gray-400">
                            Sem conta? 
                            <button type="button" onclick="window.authFunctions.switchToRegister()" class="text-purple-400 font-bold hover:text-purple-300 ml-1 transition-colors">Criar agora</button>
                        </p>
                    </div>
                </form>

                <!-- REGISTER FORM -->
                <form id="register-form" class="space-y-3 transition-all duration-500 absolute inset-0 hidden translate-x-full opacity-0">
                    <div class="space-y-1">
                        <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider ml-1">Nome</label>
                        <div class="relative group">
                            <i class="fa-regular fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-purple-400 transition-colors text-xs"></i>
                            <input type="text" id="register-name" required placeholder="Seu nome"
                                class="glass-input w-full pl-9 pr-3 py-2.5 rounded-xl text-sm placeholder-gray-500 focus:placeholder-gray-400">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider ml-1">Email</label>
                        <div class="relative group">
                            <i class="fa-regular fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-purple-400 transition-colors text-xs"></i>
                            <input type="email" id="register-email" required placeholder="seu@email.com"
                                class="glass-input w-full pl-9 pr-3 py-2.5 rounded-xl text-sm placeholder-gray-500 focus:placeholder-gray-400">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider ml-1">Senha</label>
                        <div class="relative group">
                            <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-purple-400 transition-colors text-xs"></i>
                            <input type="password" id="register-password" required placeholder="Mínimo 6 caracteres"
                                class="glass-input w-full pl-9 pr-3 py-2.5 rounded-xl text-sm placeholder-gray-500 focus:placeholder-gray-400">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[10px] font-semibold text-gray-400 uppercase tracking-wider ml-1">Confirmar</label>
                        <div class="relative group">
                            <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 group-focus-within:text-purple-400 transition-colors text-xs"></i>
                            <input type="password" id="register-confirm-password" required placeholder="Repita a senha"
                                class="glass-input w-full pl-9 pr-3 py-2.5 rounded-xl text-sm placeholder-gray-500 focus:placeholder-gray-400">
                        </div>
                    </div>

                    <button type="submit" 
                        class="w-full py-3 rounded-xl font-bold text-white bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 shadow-[0_0_15px_rgba(219,39,119,0.4)] hover:shadow-[0_0_25px_rgba(219,39,119,0.6)] transform hover:-translate-y-0.5 transition-all duration-300 active:scale-[0.98] mt-1 text-sm">
                        Criar Conta
                    </button>

                    <div class="text-center pt-1">
                        <p class="text-[10px] text-gray-400">
                            Já tem conta? 
                            <button type="button" onclick="window.authFunctions.switchToLogin()" class="text-purple-400 font-bold hover:text-purple-300 ml-1 transition-colors">Login</button>
                        </p>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Demo Accounts (Restilled) -->
        <div class="mt-8 glass-panel rounded-xl p-5 border-t border-white/5 opacity-70 hover:opacity-100 transition-opacity duration-300">
            <h3 class="text-xs font-bold uppercase tracking-widest text-purple-300 mb-3 text-center">Acesso Rápido</h3>
            <div class="flex justify-center gap-4 text-xs">
                <button onclick="window.authFunctions.fillDemo('demo@berhu.com')" class="px-3 py-1.5 rounded-lg bg-white/5 hover:bg-purple-500/20 hover:text-purple-200 transition-colors border border-white/5">
                    Cliente Demo
                </button>
                <button onclick="window.authFunctions.fillDemo('therapist@berhu.com')" class="px-3 py-1.5 rounded-lg bg-white/5 hover:bg-purple-500/20 hover:text-purple-200 transition-colors border border-white/5">
                    Terapeuta Demo
                </button>
                <button onclick="window.authFunctions.fillDemo('admin@berhu.com')" class="px-3 py-1.5 rounded-lg bg-white/5 hover:bg-purple-500/20 hover:text-purple-200 transition-colors border border-white/5">
                    Admin Demo
                </button>
            </div>
            <p class="text-[10px] text-center text-gray-500 mt-2">Senha para todos: demo123</p>
        </div>

        <p class="text-center text-[10px] text-gray-600 mt-8">
            &copy; 2025 Berhu. Todos os direitos reservados.
        </p>

    </div>

    <!-- Scripts -->
    <script src="assets/js/core.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/components.js"></script>
    <!-- Background Animation Logic -->
    <script src="assets/js/esoteric-animation.js"></script>
    <script src="js/auth.js"></script>

    <!-- Inline Script to handle Animations between tabs which CSS classes strictly might need JS help for correct 'hidden' toggling with fade effects -->
    <script>
        // Overwriting standard authFunctions to add animation support
        window.addEventListener('load', () => {
             // Basic tab state management styles are handled by CSS classes but we need to ensure the JS logical switch
             // respects the animations. The original auth.js toggles 'hidden' class.
             // We will intercept this by listening to tab clicks if we need custom behavior, 
             // OR we rely on auth.js logic.
             // auth.js merely toggles 'hidden' and some bg classes. 
             // We should check auth.js content again.
        });
    </script>
</body>
</html>

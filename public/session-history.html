<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Sessões - Berhu</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind & Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Outfit"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            purple: '#8B5CF6',
                            dark: '#0a0a0f',
                            accent: '#D946EF'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <!-- Berhu Styles -->
    <link href="assets/css/main.css" rel="stylesheet">
    <link href="assets/css/components.css" rel="stylesheet">
</head>
<body class="bg-brand-dark text-gray-100 font-sans selection:bg-purple-500 selection:text-white min-h-screen">
    
    <!-- Esoteric Background -->
    <div id="esotericIcons" class="fixed inset-0 overflow-hidden pointer-events-none z-0 opacity-30"></div>
    
    <!-- Header -->
    <header class="fixed w-full z-40 transition-all duration-300 bg-[#0a0a0f]/80 backdrop-blur-xl border-b border-white/5">
        <nav class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <a href="index.html">
                        <img src="img/logo_fabiana.png" alt="Fabiana Berkana" class="h-10 w-auto rounded-lg">
                    </a>
                </div>
                
                <div class="hidden md:flex items-center space-x-6">
                    <a href="index.html" class="text-sm font-medium hover:text-purple-400 transition-colors">Início</a>
                    <a href="profile.html" class="text-sm font-medium text-purple-400">Meu Painel</a>
                    <a href="courses.html" class="text-sm font-medium hover:text-purple-400 transition-colors">Cursos</a>
                    <a href="appointments.html" class="text-sm font-medium hover:text-purple-400 transition-colors">Agendamentos</a>
                    <a href="session-history.html" class="text-sm font-medium text-purple-400">Histórico</a>
                </div>
                
                <div class="flex items-center space-x-4">
                    <button id="logout-btn" class="glass-button px-4 py-2 rounded-lg text-xs font-semibold text-red-400 border border-red-500/20 hover:bg-red-500/10 transition-all">
                        <i class="fas fa-sign-out-alt mr-2"></i>Sair
                    </button>
                </div>
            </div>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-6 py-8 pt-28 relative z-10">
        
        <!-- Page Header -->
        <div class="mb-10 text-center md:text-left">
            <h1 class="font-display text-3xl font-bold mb-2">Histórico de Sessões</h1>
            <p class="text-gray-400 text-sm">Acompanhe sua evolução e tratamentos realizados.</p>
        </div>

        <!-- Sessions List -->
        <div class="glass-panel rounded-2xl p-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="font-display text-xl font-bold">Suas Sessões</h2>
                <div class="flex items-center space-x-4">
                    <select id="filterType" class="px-3 py-1 bg-white/10 border border-white/20 rounded-lg text-sm focus:border-brand-purple focus:outline-none">
                        <option value="all">Todos</option>
                        <option value="therapy">Terapias</option>
                        <option value="radionic">Mapas Radiônicos</option>
                    </select>
                    <button onclick="exportHistory()" class="px-3 py-1 bg-brand-purple/20 text-brand-purple rounded-lg hover:bg-brand-purple/30 transition-colors text-sm">
                        <i class="fas fa-download mr-2"></i>Exportar
                    </button>
                </div>
            </div>
            
            <div id="sessionsList" class="space-y-4">
                <div class="text-center py-12">
                    <div class="inline-flex items-center justify-center w-16 h-16 bg-white/5 rounded-full mb-4">
                        <i class="fas fa-spinner fa-spin text-2xl text-purple-400"></i>
                    </div>
                    <p class="text-gray-400">Carregando seu histórico...</p>
                </div>
            </div>
        </div>
        
    </main>

    <!-- Session Detail Modal -->
    <div id="sessionModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden">
        <div class="flex items-center justify-center min-h-screen p-4">
            <div class="bg-brand-dark rounded-2xl border border-white/10 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                <div class="p-6 border-b border-white/10">
                    <div class="flex items-center justify-between">
                        <h3 id="modalTitle" class="font-display text-xl font-bold">Detalhes da Sessão</h3>
                        <button onclick="closeModal()" class="text-gray-400 hover:text-white transition-colors">
                            <i class="fas fa-times text-xl"></i>
                        </button>
                    </div>
                </div>
                <div id="modalContent" class="p-6">
                    <!-- Content will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/esoteric-animation.js"></script>
    <script>
        let allSessions = [];
        let filteredSessions = [];

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            loadSessions();
            
            // Filter change
            document.getElementById('filterType').addEventListener('change', filterSessions);
            
            // Logout
            document.getElementById('logout-btn').addEventListener('click', () => {
                localStorage.removeItem('berhu_session');
                sessionStorage.removeItem('berhu_session');
                window.location.href = 'index.html';
            });
            
            // Init animations
            if(window.BerhuAnimations) {
                window.BerhuAnimations.init();
            }
        });

        // Load sessions from API
        async function loadSessions() {
            try {
                const token = getAuthToken();
                
                const response = await fetch('/api/therapy-sessions', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                if (response.ok) {
                    allSessions = await response.json();
                    filteredSessions = [...allSessions];
                    renderSessions();
                } else {
                    throw new Error('Failed to load sessions');
                }
            } catch (error) {
                console.error('Error loading sessions:', error);
                document.getElementById('sessionsList').innerHTML = `
                    <div class="text-center py-12">
                        <div class="inline-flex items-center justify-center w-16 h-16 bg-red-500/10 rounded-full mb-4">
                            <i class="fas fa-exclamation-triangle text-2xl text-red-400"></i>
                        </div>
                        <p class="text-gray-400">Erro ao carregar histórico. Tente novamente.</p>
                    </div>
                `;
            }
        }

        // Filter sessions
        function filterSessions() {
            const filterType = document.getElementById('filterType').value;
            
            if (filterType === 'all') {
                filteredSessions = [...allSessions];
            } else if (filterType === 'therapy') {
                filteredSessions = allSessions.filter(session => !session.type || session.type !== 'Mapa Radiônico');
            } else if (filterType === 'radionic') {
                filteredSessions = allSessions.filter(session => session.type === 'Mapa Radiônico');
            }
            
            renderSessions();
        }

        // Render sessions list
        function renderSessions() {
            const container = document.getElementById('sessionsList');
            
            if (filteredSessions.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12">
                        <div class="inline-flex items-center justify-center w-16 h-16 bg-white/5 rounded-full mb-4">
                            <i class="fas fa-calendar-times text-2xl text-gray-400"></i>
                        </div>
                        <p class="text-gray-400">
                            ${allSessions.length === 0 ? 'Você ainda não tem sessões registradas.' : 'Nenhuma sessão encontrada para este filtro.'}
                        </p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filteredSessions.map(session => {
                const date = session.date || session.created_at;
                const isRadionic = session.type === 'Mapa Radiônico';
                
                return `
                    <div class="bg-white/5 rounded-xl p-4 hover:bg-white/10 transition-all cursor-pointer border border-white/10"
                         onclick="viewSessionDetails(${allSessions.indexOf(session)})">
                        <div class="flex items-start justify-between">
                            <div class="flex-1">
                                <div class="flex items-center space-x-3 mb-2">
                                    <span class="px-2 py-1 rounded-full text-xs font-medium ${
                                        isRadionic 
                                            ? 'bg-purple-500/20 text-purple-300' 
                                            : 'bg-blue-500/20 text-blue-300'
                                    }">
                                        ${isRadionic ? '🗺️ Mapa Radiônico' : '🧘️ Sessão de Terapia'}
                                    </span>
                                    <span class="text-xs text-gray-400">
                                        ${formatDate(date)}
                                    </span>
                                </div>
                                <h3 class="font-semibold text-white mb-1">
                                    ${isRadionic ? session.objective : session.type}
                                </h3>
                                <p class="text-sm text-gray-400 line-clamp-2">
                                    ${isRadionic ? session.client_name : session.notes}
                                </p>
                                ${session.rating ? `
                                    <div class="flex items-center mt-2">
                                        ${generateStars(session.rating)}
                                    </div>
                                ` : ''}
                            </div>
                            <div class="ml-4 text-right">
                                <i class="fas fa-chevron-right text-gray-400"></i>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // View session details
        function viewSessionDetails(index) {
            const session = filteredSessions[index];
            const isRadionic = session.type === 'Mapa Radiônico';
            
            const modal = document.getElementById('sessionModal');
            const title = document.getElementById('modalTitle');
            const content = document.getElementById('modalContent');
            
            title.textContent = isRadionic ? 'Mapa Radiônico' : 'Sessão de Terapia';
            
            if (isRadionic) {
                content.innerHTML = `
                    <div class="space-y-6">
                        <div>
                            <h4 class="font-semibold text-purple-300 mb-2">Informações do Tratamento</h4>
                            <div class="grid grid-cols-2 gap-4 text-sm">
                                <div>
                                    <span class="text-gray-400">Cliente:</span>
                                    <p class="text-white font-medium">${session.client_name}</p>
                                </div>
                                <div>
                                    <span class="text-gray-400">Data:</span>
                                    <p class="text-white font-medium">${formatDate(session.treatment_date)}</p>
                                </div>
                                <div>
                                    <span class="text-gray-400">Grupo:</span>
                                    <p class="text-white font-medium">${session.group_name || 'Não especificado'}</p>
                                </div>
                                <div>
                                    <span class="text-gray-400">Duração:</span>
                                    <p class="text-white font-medium">${session.execution_days} dias</p>
                                </div>
                            </div>
                        </div>
                        
                        <div>
                            <h4 class="font-semibold text-purple-300 mb-2">Objetivo</h4>
                            <p class="text-white bg-white/5 p-3 rounded-lg">${session.objective}</p>
                        </div>
                        
                        ${session.commands && session.commands.length > 0 ? `
                            <div>
                                <h4 class="font-semibold text-purple-300 mb-2">Comandos Quânticos</h4>
                                <div class="space-y-2">
                                    ${session.commands.map(cmd => `
                                        <div class="bg-white/5 p-3 rounded-lg">
                                            <p class="font-medium text-white mb-1">${cmd.command_name}</p>
                                            <p class="text-sm text-gray-400">${cmd.description}</p>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                        
                        ${session.sectors && session.sectors.length > 0 ? `
                            <div>
                                <h4 class="font-semibold text-purple-300 mb-2">Setores Ativados</h4>
                                <div class="grid grid-cols-2 gap-2">
                                    ${session.sectors.filter(s => s.activated).map(sector => `
                                        <div class="bg-green-500/10 border border-green-500/20 p-2 rounded text-sm">
                                            <span class="text-green-300">✓</span> ${sector.sector_name}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <div class="space-y-6">
                        <div>
                            <h4 class="font-semibold text-blue-300 mb-2">Informações da Sessão</h4>
                            <div class="grid grid-cols-2 gap-4 text-sm">
                                <div>
                                    <span class="text-gray-400">Tipo:</span>
                                    <p class="text-white font-medium">${session.type}</p>
                                </div>
                                <div>
                                    <span class="text-gray-400">Data:</span>
                                    <p class="text-white font-medium">${formatDate(session.date)}</p>
                                </div>
                                ${session.next_session ? `
                                    <div>
                                        <span class="text-gray-400">Próxima Sessão:</span>
                                        <p class="text-white font-medium">${formatDate(session.next_session)}</p>
                                    </div>
                                ` : ''}
                                ${session.rating ? `
                                    <div>
                                        <span class="text-gray-400">Avaliação:</span>
                                        <div class="flex items-center">
                                            ${generateStars(session.rating)}
                                        </div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                        
                        ${session.notes ? `
                            <div>
                                <h4 class="font-semibold text-blue-300 mb-2">Notas da Sessão</h4>
                                <p class="text-white bg-white/5 p-3 rounded-lg">${session.notes}</p>
                            </div>
                        ` : ''}
                        
                        ${session.recommendations ? `
                            <div>
                                <h4 class="font-semibold text-blue-300 mb-2">Recomendações</h4>
                                <p class="text-white bg-white/5 p-3 rounded-lg">${session.recommendations}</p>
                            </div>
                        ` : ''}
                        
                        ${session.improvements && session.improvements.length > 0 ? `
                            <div>
                                <h4 class="font-semibold text-blue-300 mb-2">Melhorias Observadas</h4>
                                <ul class="space-y-1">
                                    ${session.improvements.map(improvement => `
                                        <li class="flex items-start">
                                            <span class="text-green-400 mr-2">✓</span>
                                            <span class="text-white">${improvement}</span>
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        ` : ''}
                    </div>
                `;
            }
            
            modal.classList.remove('hidden');
        }

        // Close modal
        function closeModal() {
            document.getElementById('sessionModal').classList.add('hidden');
        }

        // Export history
        function exportHistory() {
            const csvContent = generateCSV(filteredSessions);
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `historico-sessoes-${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Generate CSV
        function generateCSV(sessions) {
            let csv = "Data,Tipo,Descrição,Terapeuta,Avaliação\n";
            
            sessions.forEach(session => {
                const date = session.date || session.created_at;
                const type = session.type === 'Mapa Radiônico' ? 'Mapa Radiônico' : 'Sessão de Terapia';
                const description = session.type === 'Mapa Radiônico' ? session.objective : session.notes;
                const therapist = session.therapist_id ? 'Terapeuta' : '';
                const rating = session.rating || '';
                
                csv += `"${formatDate(date)}","${type}","${description}","${therapist}","${rating}"\n`;
            });
            
            return csv;
        }

        // Helper functions
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
        }

        function generateStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= rating) {
                    stars += '<i class="fas fa-star text-yellow-400"></i>';
                } else {
                    stars += '<i class="far fa-star text-gray-400"></i>';
                }
            }
            return stars;
        }

        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Close modal on background click
        document.getElementById('sessionModal').addEventListener('click', (e) => {
            if (e.target.id === 'sessionModal') {
                closeModal();
            }
        });
    </script>
</body>
</html>
